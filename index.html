<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viniii Hub</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #ff4081;
            --accent: #e91e63;
            --glass: rgba(255, 255, 255, 0.92);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            height: 100dvh;
            overflow: hidden;
            touch-action: none;
        }

        /* HUB MENU */
        #hubMenu {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #ff9eb7 0%, #ff6b9d 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5000; gap: 20px;
        }
        .hub-btn {
            padding: 20px 50px; font-size: 1.8rem; font-weight: 800; color: white;
            border: none; border-radius: 50px; cursor: pointer; width: 320px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }
        .btn-scoop { background: linear-gradient(45deg, var(--primary), var(--accent)); }
        .btn-particle { background: linear-gradient(45deg, #00f2ff, #0072ff); }

        /* BACK BUTTON EMOJI */
        .back-emoji {
            position: fixed; top: 15px; left: 15px; z-index: 9000;
            font-size: 30px; cursor: pointer; display: none;
            background: rgba(255,255,255,0.3); width: 50px; height: 50px;
            place-items: center; border-radius: 50%;
            backdrop-filter: blur(5px);
        }

        /* ICECREAM PAGLU STYLES */
        #scoopWrapper { display: none; flex-direction: column; height: 100%; background: #fff5f8; }
        header { padding: 16px 20px; background: var(--glass); backdrop-filter: blur(30px); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .header-controls { display: flex; gap: 10px; }
        .control-btn { width: 48px; height: 48px; background: white; border: 3px solid var(--primary); border-radius: 50%; display: grid; place-items: center; font-size: 20px; cursor: pointer; }
        .stats { display: flex; justify-content: space-around; padding: 14px 10px; background: var(--glass); backdrop-filter: blur(25px); }
        .stat-value { font-size: 2.1rem; font-weight: 700; color: var(--primary); }
        #game-container { position: relative; flex: 1; background: linear-gradient(to bottom, #fff5f8, #ffe4ef); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        .game-overlay { position: fixed; inset: 0; background: rgba(255, 240, 245, 0.9); backdrop-filter: blur(15px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; gap: 20px; }
        
        #settingsPanel { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); 
            background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            z-index: 2000; display: none; flex-direction: column; gap: 20px; opacity: 0; transition: all 0.3s ease; 
        }
        #settingsPanel.open { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .setting-row { display: flex; align-items: center; gap: 15px; width: 280px; justify-content: space-between; font-weight: bold; color: #444; }
        .action-btn { padding: 15px 50px; font-size: 1.5rem; font-weight: 700; background: linear-gradient(45deg, var(--primary), var(--accent)); color: white; border: none; border-radius: 50px; cursor: pointer; }

        /* HEY VINIIII STYLES */
        #particleWrapper { display: none; width: 100%; height: 100%; background: #000; }
        .ui { position: absolute; top: 10px; left: 75px; color: #00f2ff; font-family: sans-serif; font-size: 10px; letter-spacing: 1px; pointer-events: none; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; }
        #particleCanvas { display: block; touch-action: none; }
        video { display: none; }
    </style>
</head>
<body>

    <div id="backEmoji" class="back-emoji" onclick="returnToHub()">🏠</div>

    <div id="hubMenu">
        <h1 style="color: white; font-size: 3.5rem; text-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-bottom: 20px;">Viniii Hub</h1>
        <button class="hub-btn btn-scoop" onclick="launchScoop()">Icecream Paglu</button>
        <button class="hub-btn btn-particle" onclick="launchParticle()">Hey Viniiii</button>
    </div>

    <div id="scoopWrapper">
        <header>
            <div class="logo" style="margin-left: 60px;">Icecream Paglu</div>
            <div class="header-controls">
                <div class="control-btn" id="pauseBtn" onclick="togglePause()">⏸️</div>
                <div class="control-btn" onclick="toggleSettings()">⚙️</div>
            </div>
        </header>
        <div class="stats">
            <div class="stat">Score <span id="score" class="stat-value">0</span></div>
            <div class="stat">Lives <span id="lives" class="stat-value">5</span></div>
        </div>
        <div id="game-container">
            <canvas id="scoopCanvas"></canvas>
            <div id="vini-popup" style="position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:6.8rem;font-weight:900;background:linear-gradient(90deg,#ff4081,#ff1493);-webkit-background-clip:text;background-clip:text;color:transparent;opacity:0;transition:all 0.5s;pointer-events:none;z-index:300;">VINIII!</div>
        </div>
        
        <div id="settingsPanel">
            <h2 style="color: var(--primary); text-align: center;">Settings</h2>
            <div class="setting-row">
                <label>Background Music</label>
                <input type="checkbox" id="muteBG" onchange="updateAudio()" checked style="width:20px; height:20px;">
            </div>
            <div class="setting-row">
                <label>Catch Sounds</label>
                <input type="checkbox" id="muteCatch" onchange="updateAudio()" checked style="width:20px; height:20px;">
            </div>
            <div class="setting-row">
                <label>Difficulty</label>
                <select id="difficultySelect" onchange="difficulty = this.value" style="padding:5px; border-radius:8px; border:1px solid var(--primary); font-weight:bold;">
                    <option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option>
                </select>
            </div>
            <button onclick="toggleSettings()" class="action-btn" style="font-size:1rem; padding:10px;">Close</button>
        </div>

        <div id="overlay" class="game-overlay" style="display: none;">
            <h1 style="font-size:3.2rem;color:var(--primary);">Game Over</h1>
            <p>Final Score: <strong id="finalScore">0</strong></p>
            <button class="action-btn" onclick="startGame()">PLAY AGAIN</button>
        </div>
    </div>

    <div id="particleWrapper">
        <div class="ui">HEY VINIIII | <span id="fps">--</span> FPS</div>
        <video class="input_video"></video>
        <canvas id="particleCanvas" class="output_canvas"></canvas>
    </div>

    <audio id="bgAudio" loop><source src="bgviniii.mp3" type="audio/mpeg"></audio>
    <audio id="catchSound"><source src="viniii.mp3" type="audio/mpeg"></audio>

    <script>
        const hub = document.getElementById('hubMenu');
        const scoopDiv = document.getElementById('scoopWrapper');
        const particleDiv = document.getElementById('particleWrapper');
        const backBtn = document.getElementById('backEmoji');

        function returnToHub() {
            active = false; 
            if(camera) camera.stop();
            bgAudio.pause();
            scoopDiv.style.display = 'none';
            particleDiv.style.display = 'none';
            backBtn.style.display = 'none';
            hub.style.display = 'flex';
        }

        /* --- AUDIO LOGIC --- */
        function updateAudio() {
            const bgOn = document.getElementById('muteBG').checked;
            const catchOn = document.getElementById('muteCatch').checked;
            
            bgAudio.muted = !bgOn;
            catchSound.muted = !catchOn;
        }

        /* --- ICECREAM PAGLU LOGIC --- */
        const sCanvas = document.getElementById('scoopCanvas');
        const sCtx = sCanvas.getContext('2d');
        const popup = document.getElementById('vini-popup');
        const bgAudio = document.getElementById('bgAudio');
        const catchSound = document.getElementById('catchSound');
        const settingsPanel = document.getElementById('settingsPanel');
        let w, h, score = 0, lives = 5, active = false, isPaused = false;
        let scoops = [], coneX = 0, difficulty = "medium";
        const CONE_WIDTH = 28, CATCH_RADIUS = 45;

        function launchScoop() {
            hub.style.display = 'none';
            scoopDiv.style.display = 'flex';
            backBtn.style.display = 'grid';
            w = sCanvas.width = window.innerWidth;
            h = sCanvas.height = window.innerHeight - 165;
            coneX = w / 2;
            startGame();
        }

        function toggleSettings() { 
            const isOpen = settingsPanel.classList.toggle('open');
            if (isOpen && active && !isPaused) togglePause();
        }

        function togglePause() { 
            if (!active) return; isPaused = !isPaused;
            document.getElementById('pauseBtn').innerText = isPaused ? "▶️" : "⏸️";
            if (isPaused) bgAudio.pause(); else bgAudio.play().catch(()=>{});
        }
        function getBaseSpeed() { return difficulty === "easy" ? 2.5 : difficulty === "hard" ? 5.0 : 3.5; }

        class Scoop {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * (w - 70) + 35; this.y = -60;
                this.speed = getBaseSpeed() + Math.floor(score / 8) * 0.65 + Math.random() * 0.8;
                this.r = 26; this.hue = Math.random() * 360;
            }
        }

        function drawScoop(s) {
            const grad = sCtx.createRadialGradient(s.x-6, s.y-9, 6, s.x+4, s.y+7, s.r+4);
            grad.addColorStop(0, `hsl(${s.hue}, 85%, 88%)`); grad.addColorStop(1, `hsl(${s.hue}, 70%, 65%)`);
            sCtx.fillStyle = grad; sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI*2); sCtx.fill();
        }

        function drawCone() {
            const topY = h - 55;
            const grad = sCtx.createLinearGradient(coneX, topY, coneX, topY+85);
            grad.addColorStop(0, "#f8d9a0"); grad.addColorStop(1, "#e0b56d");
            sCtx.fillStyle = grad; sCtx.beginPath(); sCtx.moveTo(coneX - CONE_WIDTH, topY); sCtx.lineTo(coneX + CONE_WIDTH, topY); sCtx.lineTo(coneX, topY + 85); sCtx.fill();
            sCtx.strokeStyle = "#c98f4f"; sCtx.lineWidth = 2.5;
            for (let i = 1; i < 6; i++) {
                const y = topY + (85 / 6) * i; const width = CONE_WIDTH * (1 - (y - topY) / 85);
                sCtx.beginPath(); sCtx.moveTo(coneX - width, y); sCtx.lineTo(coneX + width, y); sCtx.stroke();
            }
        }

        function startGame() {
            score = 0; lives = 5; active = true; isPaused = false; scoops = [new Scoop()];
            document.getElementById('score').innerText = 0; document.getElementById('lives').innerText = 5;
            document.getElementById('overlay').style.display = 'none';
            bgAudio.play().catch(()=>{}); loopScoop();
        }

        function loopScoop() {
            if (!active) return;
            if (!isPaused) {
                sCtx.clearRect(0, 0, w, h);
                for (let s of scoops) {
                    s.y += s.speed; drawScoop(s);
                    if (s.y > h - 95 && Math.abs(s.x - coneX) < CATCH_RADIUS) {
                        score++; document.getElementById('score').innerText = score;
                        catchSound.currentTime = 0; catchSound.play().catch(()=>{});
                        popup.style.opacity = "1"; setTimeout(()=>popup.style.opacity="0", 600);
                        s.reset();
                    } else if (s.y > h + 40) {
                        lives--; document.getElementById('lives').innerText = lives;
                        s.reset(); if (lives <= 0) { active = false; document.getElementById('overlay').style.display='flex'; document.getElementById('finalScore').innerText=score; }
                    }
                }
                drawCone();
            }
            requestAnimationFrame(loopScoop);
        }
        window.addEventListener('mousemove', (e) => { if(!isPaused) coneX = Math.max(45, Math.min(w - 45, e.clientX)); });
        window.addEventListener('touchmove', (e) => { if(!isPaused) coneX = Math.max(45, Math.min(w - 45, e.touches[0].clientX)); });

        /* --- HEY VINIIII LOGIC --- */
        const pCanvas = document.getElementById('particleCanvas');
        const pCtx = pCanvas.getContext('2d', { alpha: false });
        const videoElement = document.querySelector('.input_video');
        let particles = [];
        let rotation = 0, lastTime = 0, camera = null;

        function launchParticle() {
            hub.style.display = 'none';
            particleDiv.style.display = 'block';
            backBtn.style.display = 'grid';
            pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 600; i++) particles.push(new Particle(i));
            if(!camera) initCamera();
            camera.start();
        }

        class Particle {
            constructor(i) {
                this.x = Math.random() * pCanvas.width; this.y = Math.random() * pCanvas.height;
                this.vx = 0; this.vy = 0; this.phi = Math.acos(-1 + (2 * i) / 600);
                this.theta = Math.sqrt(600 * Math.PI) * this.phi;
            }
            update(tx, ty) { this.vx += (tx - this.x) * 0.05; this.vy += (ty - this.y) * 0.05; this.vx *= 0.88; this.vy *= 0.88; this.x += this.vx; this.y += this.vy; }
            draw() { pCtx.fillRect(this.x | 0, this.y | 0, 2, 2); }
        }

        function onResults(results) {
            const now = performance.now(); document.getElementById('fps').innerText = Math.round(1000 / (now - lastTime)); lastTime = now;
            pCtx.fillStyle = 'rgba(0, 0, 0, 0.2)'; pCtx.fillRect(0, 0, pCanvas.width, pCanvas.height);
            rotation += 0.01; pCtx.fillStyle = "#00f2ff";
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const isPoint = hand[8].y < hand[6].y && hand[12].y > hand[10].y;
                particles.forEach((p, i) => {
                    if (isPoint) {
                        const t = (i / 600) * 6.28;
                        const tx = ((1-hand[9].x)*pCanvas.width) + (16 * Math.pow(Math.sin(t), 3)) * 10;
                        const ty = (hand[9].y*pCanvas.height) - (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 10;
                        p.update(tx, ty);
                    } else {
                        const tip = hand[[4,8,12,16,20][i%5]];
                        p.update((1 - tip.x) * pCanvas.width, tip.y * pCanvas.height);
                    }
                    p.draw();
                });
            } else {
                particles.forEach(p => {
                    p.update((pCanvas.width/2) + Math.cos(p.theta+rotation)*Math.sin(p.phi)*150, (pCanvas.height/2) + Math.cos(p.phi)*150);
                    p.draw();
                });
            }
        }

        function initCamera() {
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
            hands.onResults(onResults);
            camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 });
        }
    </script>
</body>
</html>
