<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viniii Scoop Catch - Custom Deluxe</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #fff5f8 0%, #ffe0e9 100%);
            --primary: #ff85a2;
            --accent: #ff4081;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Comic Sans MS', 'Arial', sans-serif; 
            background: var(--bg);
            height: 100vh; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Settings Gear Icon */
        #settings-trigger {
            position: fixed; top: 20px; right: 20px;
            font-size: 28px; z-index: 100; cursor: pointer;
            background: var(--glass); padding: 8px; border-radius: 50%;
            box-shadow: 0 4px 10px rgba(255, 133, 162, 0.2);
            border: 2px solid #fff;
            display: flex; align-items: center; justify-content: center;
        }

        /* Settings Panel */
        .controls {
            position: fixed; bottom: -400px; width: 85%; max-width: 400px;
            background: var(--glass); padding: 25px; border-radius: 30px 30px 0 0;
            box-shadow: 0 -8px 32px rgba(255, 133, 162, 0.2);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 95; backdrop-filter: blur(15px); border: 2px solid #fff;
            text-align: center;
        }
        .controls.open { bottom: 0; }

        /* Stats Bar */
        .stats {
            display: flex; justify-content: space-around;
            width: 85%; margin-top: 20px; padding: 15px;
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 25px; box-shadow: 0 8px 32px rgba(255, 133, 162, 0.2);
            z-index: 10; border: 2px solid #fff;
        }

        .stat-box { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        #game-container { position: relative; width: 100vw; height: 75vh; margin: 10px 0; }
        #gameCanvas { display: block; width: 100%; height: 100%; }

        #vini-popup {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 70px; font-weight: 900; color: var(--accent);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            display: none; z-index: 100; pointer-events: none;
            animation: bounce 0.4s ease;
        }

        @keyframes bounce {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .play-btn {
            padding: 20px 60px; background: var(--accent); color: white;
            border: none; border-radius: 50px; font-size: 24px;
            font-weight: bold; box-shadow: 0 10px 20px rgba(255, 64, 129, 0.4);
            cursor: pointer;
        }

        .shake { animation: btnShake 0.4s infinite; }
        @keyframes btnShake {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        input[type="file"] {
            margin-top: 10px;
            font-size: 14px;
            color: var(--accent);
        }
    </style>
</head>
<body>

<div id="settings-trigger" onclick="toggleSettings()">⚙️</div>

<div id="overlay">
    <h1 style="color: var(--accent); font-size: 3.5rem; margin-bottom: 10px;">Viniii! 🍦</h1>
    <p style="color: #666; margin-bottom: 30px;">Catch the falling scoops!</p>
    <button id="mainBtn" class="play-btn" onclick="startGame()">START GAME</button>
</div>

<div id="vini-popup">Viniii!</div>

<div class="stats">
    <div class="stat-box">🍦 <span id="score">0</span></div>
    <div id="lives-container" class="stat-box">❤️ <span id="lives">5</span></div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<div id="settingsPanel" class="controls">
    <h3 style="color: var(--accent); margin-bottom: 5px;">Custom Catch Sound</h3>
    <p style="font-size: 12px; color: #888;">Select a file to play when you catch ice cream!</p>
    <input type="file" id="audioUpload" accept="audio/*">
    <br>
    <button onclick="toggleSettings()" style="margin-top: 20px; background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;">Save & Close</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const popup = document.getElementById('vini-popup');
    const overlay = document.getElementById('overlay');
    const mainBtn = document.getElementById('mainBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const audioUpload = document.getElementById('audioUpload');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.75;

    let score = 0, lives = 5, active = false;
    let scoops = [];
    let coneX = canvas.width / 2 - 30;
    
    // Initial Audio
    let catchSnd = new Audio('https://s19.aconvert.com/convert/p3r68-cdx67/9mh1n-uyp05.mp3'); 

    function toggleSettings() {
        settingsPanel.classList.toggle('open');
    }

    // Handle Custom Audio Upload
    audioUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            catchSnd = new Audio(url);
        }
    });

    function createScoop() {
        return {
            x: Math.random() * (canvas.width - 40) + 20,
            y: -50,
            speed: 5.5 + Math.random() * 2.5,
            color: `hsl(${Math.random() * 360}, 80%, 80%)`,
            r: 18
        };
    }

    const move = (e) => {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        coneX = Math.max(0, Math.min(canvas.width - 60, x - 30));
    };
    window.addEventListener('touchmove', move);
    window.addEventListener('mousemove', move);

    function playViniEffect() {
        catchSnd.currentTime = 0;
        catchSnd.play().catch(() => {});
        popup.style.display = 'block';
        setTimeout(() => { popup.style.display = 'none'; }, 300);
    }

    function startGame() {
        overlay.style.display = 'none';
        mainBtn.classList.remove('shake');
        score = 0; lives = 5; active = true;
        document.getElementById('score').innerText = 0;
        document.getElementById('lives').innerText = 5;
        scoops = [createScoop()];
        loop();
    }

    function loop() {
        if(!active) return;
        ctx.clearRect(0,0, canvas.width, canvas.height);

        // Draw Cone
        ctx.fillStyle = "#F3D299";
        ctx.beginPath();
        ctx.moveTo(coneX, canvas.height - 30);
        ctx.lineTo(coneX + 60, canvas.height - 30);
        ctx.lineTo(coneX + 30, canvas.height);
        ctx.fill();

        scoops.forEach((s, index) => {
            ctx.fillStyle = s.color;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            
            s.y += s.speed;

            if(s.y > canvas.height - 40 && s.x > coneX && s.x < coneX + 60) {
                score++; 
                document.getElementById('score').innerText = score;
                playViniEffect(); 
                scoops[index] = createScoop();
            }

            if(s.y > canvas.height + 20) {
                lives--; 
                document.getElementById('lives').innerText = lives;
                scoops[index] = createScoop();
                
                if(lives <= 0) {
                    active = false;
                    mainBtn.innerText = "viniii 😭 TRY AGAIN";
                    mainBtn.classList.add('shake');
                    overlay.style.display = 'flex';
                }
            }
        });
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
