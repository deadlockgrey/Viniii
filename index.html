<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viniii Scoop Catch</title>
    <style>
        :root {
            --primary: #ff4081;
            --accent: #e91e63;
            --glass: rgba(255, 255, 255, 0.92);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff9eb7 0%, #ff6b9d 100%);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: none;
        }

        header {
            padding: 16px 20px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .logo { font-size: 1.85rem; font-weight: 800; color: var(--primary); }

        .header-controls { display: flex; gap: 10px; }

        .control-btn {
            width: 48px; height: 48px;
            background: white;
            border: 3px solid var(--primary);
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .control-btn:active { transform: scale(0.9); }

        .stats {
            display: flex; justify-content: space-around; padding: 14px 10px;
            background: var(--glass); backdrop-filter: blur(25px);
        }

        .stat-value { font-size: 2.1rem; font-weight: 700; color: var(--primary); }

        #game-container { position: relative; flex: 1; background: linear-gradient(to bottom, #fff5f8, #ffe4ef); overflow: hidden; }

        canvas { display: block; width: 100%; height: 100%; }

        /* Overlays */
        .game-overlay {
            position: fixed; inset: 0;
            background: rgba(255, 240, 245, 0.9);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000; gap: 20px;
        }

        #settingsPanel {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: white; padding: 30px;
            border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 2000; display: none;
            flex-direction: column; gap: 20px; opacity: 0;
            transition: all 0.3s ease;
        }

        #settingsPanel.open { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .setting-row { display: flex; align-items: center; gap: 15px; width: 240px; justify-content: space-between; font-weight: bold; color: #444; }

        .action-btn {
            padding: 15px 50px; font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.3);
        }
    </style>
</head>
<body>

<div id="startOverlay" class="game-overlay">
    <h1 style="font-size:4.2rem;color:var(--primary);">Viniii 🍦</h1>
    <p style="font-size:1.4rem;color:#555;">Catch the falling scoops!</p>
    <button class="action-btn" onclick="startGame()">START GAME</button>
</div>

<div id="pauseOverlay" class="game-overlay" style="display: none;">
    <h1 style="font-size:3.5rem;color:var(--primary);">Paused</h1>
    <button class="action-btn" onclick="togglePause()">RESUME</button>
    <button style="background:none; border:2px solid var(--primary); color:var(--primary); padding:10px 30px; border-radius:50px; cursor:pointer; font-weight:bold; margin-top:10px;" onclick="location.reload()">QUIT</button>
</div>

<header>
    <div class="logo">Viniii</div>
    <div class="header-controls">
        <div class="control-btn" id="pauseBtn" onclick="togglePause()">⏸️</div>
        <div class="control-btn" onclick="toggleSettings()">⚙️</div>
    </div>
</header>

<div id="settingsPanel">
    <h2 style="color: var(--primary); text-align: center; margin-bottom: 10px;">Settings</h2>
    <div class="setting-row">
        <label>Mute Audio</label>
        <input type="checkbox" id="muteAudio" onchange="toggleMute()" style="width:20px; height:20px;">
    </div>
    <div class="setting-row">
        <label>Difficulty</label>
        <select id="difficultySelect" onchange="changeDifficulty()" style="padding:5px 10px; border-radius:8px; border:2px solid var(--primary); color: var(--primary); font-weight: bold;">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
        </select>
    </div>
    <button onclick="toggleSettings()" class="action-btn" style="font-size:1rem; padding:10px 30px; margin-top:10px;">CLOSE</button>
</div>

<div class="stats">
    <div class="stat">Score <span id="score" class="stat-value">0</span></div>
    <div class="stat">Lives <span id="lives" class="stat-value">5</span></div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="vini-popup" style="position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:6.8rem;font-weight:900;background:linear-gradient(90deg,#ff4081,#ff1493);-webkit-background-clip:text;background-clip:text;color:transparent;opacity:0;transition:all 0.5s cubic-bezier(0.175,0.885,0.32,1.8);pointer-events:none;z-index:300;">VINIII!</div>
</div>

<div id="overlay" class="game-overlay" style="display: none;">
    <h1 style="font-size:3.2rem;color:var(--primary);">Game Over</h1>
    <p style="font-size:1.4rem;">Final Score: <strong id="finalScore">0</strong></p>
    <button class="action-btn" onclick="restartGame()">PLAY AGAIN</button>
</div>

<audio id="bgAudio" loop><source src="bgviniii.mp3" type="audio/mpeg"></audio>
<audio id="catchSound"><source src="viniii.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const popup = document.getElementById('vini-popup');
    const startOverlay = document.getElementById('startOverlay');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const gameOverlay = document.getElementById('overlay');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const finalScoreEl = document.getElementById('finalScore');
    const bgAudio = document.getElementById('bgAudio');
    const catchSound = document.getElementById('catchSound');
    const settingsPanel = document.getElementById('settingsPanel');
    const pauseBtn = document.getElementById('pauseBtn');

    let w, h, score = 0, lives = 5, active = false, isPaused = false;
    let scoops = [], coneX = 0;
    
    // Core Configuration
    const CONE_WIDTH = 28; 
    const CATCH_RADIUS = 45;
    let difficulty = "medium";

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight - 165;
        coneX = w / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // UI Logic
    function toggleSettings() {
        const isOpen = settingsPanel.classList.toggle('open');
        // Pause if opening settings while the game is running
        if (isOpen && active && !isPaused) {
            togglePause();
        }
    }

    function toggleMute() {
        const m = document.getElementById('muteAudio').checked;
        bgAudio.muted = m; catchSound.muted = m;
    }

    function changeDifficulty() { difficulty = document.getElementById('difficultySelect').value; }

    function getBaseSpeed() {
        return difficulty === "easy" ? 2.5 : difficulty === "hard" ? 5.0 : 3.5;
    }

    function togglePause() {
        if (!active) return;
        isPaused = !isPaused;
        pauseOverlay.style.display = isPaused ? "flex" : "none";
        pauseBtn.innerText = isPaused ? "▶️" : "⏸️";
        if (isPaused) bgAudio.pause(); else bgAudio.play().catch(() => {});
    }

    // Drawing Logic
    class Scoop {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * (w - 70) + 35;
            this.y = -60;
            this.speed = getBaseSpeed() + Math.floor(score / 8) * 0.65 + Math.random() * 0.8;
            this.r = 26;
            this.hue = Math.random() * 360;
        }
    }

    function drawRealisticScoop(s) {
        const grad = ctx.createRadialGradient(s.x-6, s.y-9, 6, s.x+4, s.y+7, s.r+4);
        grad.addColorStop(0, `hsl(${s.hue}, 85%, 88%)`);
        grad.addColorStop(0.7, `hsl(${s.hue}, 78%, 76%)`);
        grad.addColorStop(1, `hsl(${s.hue}, 70%, 65%)`);
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
        
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath(); ctx.arc(s.x-8, s.y-10, 8, 0, Math.PI*2); ctx.fill();
    }

    function drawRealisticCone() {
        const topY = h - 55;
        const grad = ctx.createLinearGradient(coneX, topY, coneX, topY+85);
        grad.addColorStop(0, "#f8d9a0"); grad.addColorStop(1, "#e0b56d");
        
        // Shape
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(coneX - CONE_WIDTH, topY);
        ctx.lineTo(coneX + CONE_WIDTH, topY);
        ctx.lineTo(coneX, topY + 85);
        ctx.fill();

        // Texture Lines (Waffle Effect)
        ctx.strokeStyle = "#c98f4f";
        ctx.lineWidth = 2.5;
        for (let i = 1; i < 6; i++) {
            const y = topY + (85 / 6) * i;
            const width = CONE_WIDTH * (1 - (y - topY) / 85);
            ctx.beginPath();
            ctx.moveTo(coneX - width, y);
            ctx.lineTo(coneX + width, y);
            ctx.stroke();
        }
    }

    function playCatchEffect() {
        catchSound.currentTime = 0; catchSound.play().catch(() => {});
        popup.style.opacity = "1"; popup.style.transform = "translate(-50%, -50%) scale(1.3)";
        setTimeout(() => { popup.style.opacity = "0"; popup.style.transform = "translate(-50%, -50%) scale(0.6)"; }, 600);
    }

    const moveCone = (e) => {
        if (isPaused) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        coneX = Math.max(45, Math.min(w - 45, clientX));
    };
    window.addEventListener('mousemove', moveCone);
    window.addEventListener('touchmove', moveCone, { passive: true });

    // Game Control
    function startGame() {
        startOverlay.style.display = "none";
        bgAudio.play().catch(() => {});
        score = 0; lives = 5; active = true; isPaused = false;
        scoops = [new Scoop()];
        scoreEl.textContent = 0; livesEl.textContent = lives;
        loop();
    }

    function gameOver() {
        active = false; bgAudio.pause();
        finalScoreEl.textContent = score;
        gameOverlay.style.display = "flex";
    }

    function restartGame() {
        gameOverlay.style.display = "none";
        startOverlay.style.display = "flex";
        bgAudio.currentTime = 0;
    }

    function loop() {
        if (!active) return;
        if (isPaused) { requestAnimationFrame(loop); return; }

        ctx.clearRect(0, 0, w, h);
        for (let s of scoops) {
            s.y += s.speed;
            drawRealisticScoop(s);
            if (s.y > h - 95 && Math.abs(s.x - coneX) < CATCH_RADIUS) {
                score++; scoreEl.textContent = score;
                playCatchEffect(); s.reset();
            } else if (s.y > h + 40) {
                lives--; livesEl.textContent = lives;
                s.reset();
                if (lives <= 0) gameOver();
            }
        }
        drawRealisticCone();
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
