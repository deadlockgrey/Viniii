<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viniii Scoop Catch</title>
    <style>
        :root {
            --primary: #ff4081;
            --accent: #e91e63;
            --glass: rgba(255, 255, 255, 0.92);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff9eb7 0%, #ff6b9d 100%);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: none;
        }

        header {
            padding: 16px 20px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .logo { font-size: 1.85rem; font-weight: 800; color: var(--primary); }

        .settings-btn {
            width: 48px; height: 48px;
            background: white;
            border: 3px solid var(--primary);
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 24px;
            cursor: pointer;
        }

        .stats {
            display: flex; justify-content: space-around; padding: 14px 10px;
            background: var(--glass); backdrop-filter: blur(25px);
        }

        .stat-value { font-size: 2.1rem; font-weight: 700; color: var(--primary); }

        #game-container { position: relative; flex: 1; background: linear-gradient(to bottom, #fff5f8, #ffe4ef); overflow: hidden; }

        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="startOverlay" style="position:fixed;inset:0;background:rgba(255,240,245,0.95);backdrop-filter:blur(30px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:25px;">
    <h1 style="font-size:4.2rem;color:var(--primary);">Viniii 🍦</h1>
    <p style="font-size:1.4rem;color:#555;">Catch the falling scoops!</p>
    <button onclick="startGame()" style="padding:18px 70px;font-size:1.8rem;font-weight:700;background:linear-gradient(45deg,var(--primary),var(--accent));color:white;border:none;border-radius:50px;cursor:pointer;">START GAME</button>
</div>

<header>
    <div class="logo">Viniii Scoop</div>
    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
</header>

<div class="stats">
    <div class="stat">Score <span id="score" class="stat-value">0</span></div>
    <div class="stat">Lives <span id="lives" class="stat-value">5</span></div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="vini-popup" style="position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:6.8rem;font-weight:900;background:linear-gradient(90deg,#ff4081,#ff1493);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 50px rgba(255,255,255,0.9);pointer-events:none;z-index:300;opacity:0;transition:all 0.55s cubic-bezier(0.175,0.885,0.32,1.8);">VINIII!</div>
</div>

<div id="overlay" style="position:fixed;inset:0;background:rgba(255,240,245,0.95);backdrop-filter:blur(30px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:25px;">
    <h1 style="font-size:3.2rem;color:var(--primary);">Game Over</h1>
    <p style="font-size:1.4rem;">Final Score: <strong id="finalScore">0</strong></p>
    <button onclick="restartGame()" style="padding:18px 70px;font-size:1.8rem;font-weight:700;background:linear-gradient(45deg,var(--primary),var(--accent));color:white;border:none;border-radius:50px;cursor:pointer;">PLAY AGAIN</button>
</div>

<!-- Your Video Audio -->
<audio id="bgAudio" loop>
    <!-- Replace this with your extracted audio file -->
    <source src="YOUR_VIDEO_AUDIO.mp3" type="audio/mpeg">
</audio>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const popup = document.getElementById('vini-popup');
    const startOverlay = document.getElementById('startOverlay');
    const gameOverlay = document.getElementById('overlay');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const finalScoreEl = document.getElementById('finalScore');
    const bgAudio = document.getElementById('bgAudio');

    let w, h, score = 0, lives = 5, active = false;
    let scoops = [], coneX = 0;
    let difficulty = "medium";

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight - 165;
        coneX = w / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    function getBaseSpeed() {
        if (difficulty === "easy") return 2.8;
        if (difficulty === "hard") return 4.5;
        return 3.5;
    }

    class Scoop {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * (w - 70) + 35;
            this.y = -60;
            this.speed = getBaseSpeed() + Math.floor(score / 8) * 0.65 + Math.random() * 0.8;
            this.r = 26;
            this.hue = Math.random() * 360;
        }
    }

    function drawRealisticScoop(s) {
        const grad = ctx.createRadialGradient(s.x - 6, s.y - 9, 6, s.x + 4, s.y + 7, s.r + 4);
        grad.addColorStop(0, `hsl(${s.hue}, 85%, 88%)`);
        grad.addColorStop(0.7, `hsl(${s.hue}, 78%, 76%)`);
        grad.addColorStop(1, `hsl(${s.hue}, 70%, 65%)`);

        ctx.shadowBlur = 12;
        ctx.shadowColor = `hsl(${s.hue}, 50%, 55%)`;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.beginPath();
        ctx.arc(s.x - 8, s.y - 10, 9, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawRealisticCone() {
        const topY = h - 55;
        const grad = ctx.createLinearGradient(coneX, topY, coneX, topY + 85);
        grad.addColorStop(0, "#f8d9a0");
        grad.addColorStop(1, "#e0b56d");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(coneX - 38, topY);
        ctx.lineTo(coneX + 38, topY);
        ctx.lineTo(coneX, topY + 85);
        ctx.fill();

        ctx.strokeStyle = "#c98f4f";
        ctx.lineWidth = 3.5;
        for (let i = 1; i < 6; i++) {
            const y = topY + (85 / 6) * i;
            const width = 38 * (1 - (y - topY) / 85);
            ctx.beginPath();
            ctx.moveTo(coneX - width, y);
            ctx.lineTo(coneX + width, y);
            ctx.stroke();
        }
    }

    function createScoop() {
        if (scoops.length === 0) scoops.push(new Scoop());
    }

    function playCatchEffect() {
        popup.style.opacity = "1";
        popup.style.transform = "translate(-50%, -50%) scale(1.3)";
        setTimeout(() => {
            popup.style.opacity = "0";
            popup.style.transform = "translate(-50%, -50%) scale(0.6)";
        }, 600);
    }

    const moveCone = (e) => {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        coneX = Math.max(45, Math.min(w - 45, clientX));
    };
    window.addEventListener('mousemove', moveCone);
    window.addEventListener('touchmove', moveCone, { passive: true });

    function toggleSettings() {
        document.getElementById('settingsPanel').classList.toggle('open');
    }

    function startGame() {
        startOverlay.style.display = "none";
        bgAudio.play().catch(() => {});
        score = 0;
        lives = 5;
        scoops = [];
        scoreEl.textContent = 0;
        livesEl.textContent = lives;
        active = true;
        coneX = w / 2;
        createScoop();
        loop();
    }

    function gameOver() {
        active = false;
        bgAudio.pause();
        finalScoreEl.textContent = score;
        gameOverlay.style.display = "flex";
    }

    function restartGame() {
        gameOverlay.style.display = "none";
        startOverlay.style.display = "flex";
        bgAudio.pause();
        bgAudio.currentTime = 0;
    }

    function loop() {
        if (!active) return;
        ctx.clearRect(0, 0, w, h);

        if (scoops.length === 0) {
            setTimeout(() => { if (active && scoops.length === 0) createScoop(); }, 900);
        }

        for (let i = scoops.length - 1; i >= 0; i--) {
            const s = scoops[i];
            s.y += s.speed;

            drawRealisticScoop(s);

            if (s.y > h - 95 && Math.abs(s.x - coneX) < 62) {
                score++;
                scoreEl.textContent = score;
                playCatchEffect();
                scoops.splice(i, 1);
            } else if (s.y > h + 40) {
                lives--;
                livesEl.textContent = lives;
                scoops.splice(i, 1);
                if (lives <= 0) gameOver();
            }
        }

        drawRealisticCone();
        requestAnimationFrame(loop);
    }

    window.onload = () => {
        resize();
        // Audio will start when user clicks "START GAME"
    };
</script>
</body>
</html>
