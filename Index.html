<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viniii Scoop Catch</title>
    <style>
        :root { --primary: #ff4081; --accent: #e91e63; --glass: rgba(255, 255, 255, 0.92); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff9eb7 0%, #ff6b9d 100%);
            height: 100dvh; overflow: hidden; display: flex; flex-direction: column; touch-action: none;
        }
        header { padding: 15px; background: var(--glass); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .stats { display: flex; justify-content: space-around; padding: 10px; background: var(--glass); font-weight: bold; }
        #game-container { position: relative; flex: 1; overflow: hidden; background: #fff5f8; }
        canvas { display: block; width: 100%; height: 100%; }
        #startOverlay, #overlay {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }
        button { padding: 15px 50px; font-size: 1.5rem; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div id="startOverlay">
    <h1 style="color:var(--primary); font-size: 3.5rem;">Viniii 🍦</h1>
    <p>Catch the falling scoops!</p>
    <button onclick="startGame()">START GAME</button>
</div>

<header>
    <div style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">Viniii Scoop</div>
</header>

<div class="stats">
    <div>Score: <span id="score" style="color:var(--primary)">0</span></div>
    <div>Lives: <span id="lives" style="color:var(--primary)">5</span></div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="vini-popup" style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-size:5rem; font-weight:900; color:var(--primary); opacity:0; pointer-events:none; transition: 0.3s;">VINIII!</div>
</div>

<div id="overlay" style="display:none;">
    <h1 style="color:var(--primary);">Game Over</h1>
    <p style="font-size: 1.2rem;">Final Score: <strong id="finalScore">0</strong></p>
    <button onclick="location.reload()">PLAY AGAIN</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const popup = document.getElementById('vini-popup');

    let w, h, score = 0, lives = 5, active = false, coneX = 0, scoops = [];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = canvas.offsetHeight;
        coneX = w / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    class Scoop {
        constructor() {
            this.x = Math.random() * (w - 60) + 30;
            this.y = -50;
            this.speed = 3 + (score * 0.12); // Increases as you score
            this.color = `hsl(${Math.random() * 360}, 80%, 70%)`;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 25, 0, Math.PI * 2);
            ctx.fill();
            // Highlight for realism
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.beginPath();
            ctx.arc(this.x - 8, this.y - 8, 8, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function startGame() {
        document.getElementById('startOverlay').style.display = 'none';
        active = true;
        animate();
    }

    const move = (e) => {
        let x = e.touches ? e.touches[0].clientX : e.clientX;
        coneX = Math.max(30, Math.min(w - 30, x));
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move, {passive: true});

    function animate() {
        if (!active) return;
        ctx.clearRect(0, 0, w, h);

        // Draw Cone
        ctx.fillStyle = "#f8d9a0";
        ctx.beginPath();
        ctx.moveTo(coneX - 35, h - 30);
        ctx.lineTo(coneX + 35, h - 30);
        ctx.lineTo(coneX, h + 60);
        ctx.fill();

        // Spawn Logic
        if (Math.random() < 0.025) scoops.push(new Scoop());

        for (let i = scoops.length - 1; i >= 0; i--) {
            const s = scoops[i];
            s.y += s.speed;
            s.draw();

            // Catch Detection
            if (s.y > h - 60 && Math.abs(s.x - coneX) < 45) {
                score++;
                scoreEl.innerText = score;
                scoops.splice(i, 1);
                
                // Catch Effect
                popup.style.opacity = 1;
                setTimeout(() => popup.style.opacity = 0, 400);
            } 
            // Miss Detection
            else if (s.y > h + 30) {
                lives--;
                livesEl.innerText = lives;
                scoops.splice(i, 1);
                if (lives <= 0) {
                    active = false;
                    document.getElementById('overlay').style.display = 'flex';
                    document.getElementById('finalScore').innerText = score;
                }
            }
        }
        requestAnimationFrame(animate);
    }

    // Ensure the canvas is ready
    window.onload = resize;
</script>
</body>
</html>
